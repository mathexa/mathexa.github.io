<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathexa</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="landing" class="center">
  <h1>Mathexa</h1>
  <button id="btnLogin">Turiu paskyrą</button>
  <button id="btnSignup">Esu naujas</button>
</div>

<div id="login" class="center hidden">
  <h2>Prisijungti</h2>
  <input id="email" placeholder="El. paštas">
  <input id="password" type="password" placeholder="Slaptažodis">
  <div id="loginStatus"></div>

  <label>
    <input type="checkbox" id="stayLogin"> Likti prisijungus (3h)
  </label>

  <button id="loginBtn">Prisijungti</button>
  <button id="back1">Atgal</button>
</div>

<div id="signup" class="center hidden">
  <h2>Registracija</h2>
  <input id="name" placeholder="Vardas Pavardė">
  <input id="email2" placeholder="El. paštas">

  <div class="row">
    <select id="prefix"></select>
    <input id="phone" placeholder="Telefono nr.">
  </div>

  <select id="role">
    <option value="student">Studentas</option>
    <option value="teacher">Mokytojas</option>
  </select>

  <input id="password2" type="password" placeholder="Slaptažodis">
  <div id="passwordFeedback"></div>

  <input id="password3" type="password" placeholder="Pakartokite slaptažodį">
  <div id="matchFeedback"></div>

  <div class="policyBox">
    Sukurdami paskyrą jūs sutinkate su
    <a href="policy.txt" target="_blank">taisyklemis</a>
  </div>

  <div id="signupStatus"></div>

  <button id="signupBtn">Sukurti</button>
  <button id="back2">Atgal</button>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="logo">Mathexa</div>
    <div class="actions">
      <span id="headerClicks">Limitas: --</span>
      <button id="settingsBtn">⚙</button>
    </div>
  </div>
  
  <div id="videos" class="video-grid"></div>
</div>

<div id="settings" class="center hidden">
  <h2>Nustatymai</h2>
  <h3 id="clicksInfo">Liko peržiūrų: Kraunama...</h3>

  <button id="logoutBtn" style="background: #ff4d4d;">Atsijungti</button>
  <button id="closeSettings">Atgal į App</button>
</div>

<script src="app.js"></script>
</body>
</html>
