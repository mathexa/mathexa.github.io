<!DOCTYPE html>
<html>
<head>
  <title>Learning</title>

</head>
<body>

  <h2>Signup</h2>

  <input id="email2" placeholder="Email">

  <select id="role">
    <option>student</option>
    <option>teacher</option>
  </select>
  <button onclick="signup()">Signup</button>
</div>

<div id="app" style="display:none;">
  <h2>Videos</h2>
  <div id="videos"></div>
</div>

<script src="app.js"></script>
</body>
</html>
