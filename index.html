<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mathexa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div id="landing">
    <h1>Mathexa</h1>
    <button id="btnLogin">Login</button>
    <button id="btnSignup">Create Account</button>
  </div>

  <div id="login" class="hidden">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <div id="loginStatus"></div>
    <button id="back1">← Back</button>
  </div>

  <div id="signup" class="hidden">
    <h2>Create Account</h2>

    <input id="name" placeholder="Name">

    <div class="phoneRow">
      <select id="prefix"></select>
      <input id="phone" placeholder="Phone">
    </div>

    <input id="email2" placeholder="Email">

    <input id="password2" type="password" placeholder="Password">
    <div id="passwordFeedback"></div>

    <input id="password3" type="password" placeholder="Repeat Password">
    <div id="matchFeedback"></div>

    <select id="role">
      <option value="student">student</option>
      <option value="teacher">teacher</option>
    </select>

    <button id="signupBtn">Create</button>
    <button id="back2">← Back</button>
  </div>

  <div id="app" class="hidden">

    <div class="topbar">
      <b>Mathexa</b>
    </div>

    <div id="status"></div>

    <input id="search" placeholder="Search by title or category...">

    <div class="controls">
      <input id="codeInput" placeholder="Enter subscription code">
      <button id="applyCodeBtn">Activate</button>
      <button id="settingsBtn">Settings</button>
    </div>

    <div id="videos"></div>
  </div>

  <div id="settings" class="hidden">
    <h2>Settings</h2>
    <p>Website version: v3.4</p>
    <p>Password security: v2.1.2</p>
    <p>Last updated: 2026-03-23</p>
    <button id="closeSettings">Close</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
