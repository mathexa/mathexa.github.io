<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mathexa 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="globalLoader" class="loading-overlay hidden">
        <div class="loader-content">
            <div class="spinner"></div>
            <p>Kreipiamasi į serverį...<br><span style="font-size:12px; opacity:0.7;">Prašome palaukti</span></p>
        </div>
    </div>

    <div id="landing" class="center">
        <h1>Mathexa</h1>
        <button id="btnLogin">Prisijungti</button>
        <button id="btnSignup">Registruotis</button>
    </div>

    <div id="login" class="center hidden">
        <h2>Prisijungti</h2>
        <input id="email" type="email" placeholder="El. paštas">
        <input id="password" type="password" placeholder="Slaptažodis">
        <div id="loginStatus" class="status-msg"></div>
        <button id="loginBtn">Eiti</button>
        <button onclick="back()">Atgal</button>
    </div>

    <div id="signup" class="center hidden">
        <h2>Nauja paskyra</h2>
        <input id="name" placeholder="Vardas Pavardė">
        <input id="email2" type="email" placeholder="El. paštas">
        <div class="row">
            <select id="prefix" style="width:75px;"></select>
            <input id="phone" type="tel" placeholder="Tel. nr." style="width:140px;">
        </div>
        <select id="role">
            <option value="student">Studentas</option>
            <option value="teacher">Mokytojas</option>
        </select>
        <div class="password-section">
            <input id="password2" type="password" placeholder="Slaptažodis">
            <input id="password3" type="password" placeholder="Pakartokite slaptažodį">
        </div>
        <div id="signupStatus" class="status-msg"></div>
        <button id="signupBtn">Sukurti</button>
        <button onclick="back()">Atgal</button>
    </div>

    <div id="app" class="hidden">
        <div class="topbar">
            <div class="logo">Mathexa</div>
            <div class="actions">
                <span id="headerClicks" class="click-badge">--</span>
                <button id="settingsBtn">⚙</button>
            </div>
        </div>
        <div id="videos" class="video-grid"></div>
    </div>

    <div id="settings" class="center hidden">
        <h2>Nustatymai</h2>
        <div id="supportIdView">ID: Kraunama...</div>
        <h3 id="clicksInfo">Liko: --</h3>
        <label class="check-container"><input type="checkbox" id="stayLoginSettings"> Likti prisijungus</label>
        <button id="logoutBtn" style="background:#ff4d4d; margin-top:20px;">Atsijungti</button>
        <button id="closeSettings">Grįžti</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
