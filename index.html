<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <title>Mathexa v0.1.12</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css?v=113">
</head>
<body>

<div class="background"></div>

<!-- LANDING -->
<div id="landing" class="center">
  <div class="card">
    <h1>Mathexa</h1>
    <p>Mokykis išmaniau</p>
    <button onclick="goAuth()">Pradėti</button>
  </div>
</div>

<!-- AUTH -->
<div id="auth" class="center hidden">
  <div class="card">
    <h2>Prisijungimas / Registracija</h2>

    <input id="name" placeholder="Vardas Pavardė">
    <input id="email" placeholder="El. paštas">
    <div id="emailError" class="error"></div>

    <input id="password" type="password" placeholder="Slaptažodis">
    <div id="passError" class="error"></div>

    <input id="code" placeholder="Kodas (nebūtina)">

    <button onclick="register()">Registruotis</button>
    <button onclick="login()">Prisijungti</button>

    <div id="status" class="status"></div>
  </div>
</div>

<!-- VIDEOS -->
<div id="videos" class="videos hidden"></div>

<!-- PLAYER -->
<div id="playerModal" class="modal hidden">
  <div class="modal-box">
    <iframe id="player"></iframe>
    <button onclick="closePlayer()">Uždaryti</button>
  </div>
</div>

<!-- LOCK -->
<div id="lockScreen" class="lock hidden">
  <div class="lock-box">
    <h2>Limitas pasiektas</h2>
    <p>Įsigykite prenumeratą</p>
    <button onclick="goAuth()">Grįžti į prisijungimą</button>
  </div>
</div>

<script src="app.js?v=113"></script>
</body>
</html>
