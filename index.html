<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathexa</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<!-- LANDING -->
<div id="landing" class="screen active center">
  <div class="card">
    <h1>Mathexa</h1>
    <button class="btn primary" onclick="showScreen('login')">Prisijungti</button>
    <button class="btn secondary" onclick="showScreen('register')">Registruotis</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="screen center">
  <div class="card">
    <h2>Prisijungimas</h2>
    <input id="loginEmail" placeholder="El. paštas">
    <input id="loginPassword" type="password" placeholder="Slaptažodis">
    <button class="btn primary" onclick="login()">Prisijungti</button>
    <div id="loginStatus" class="status"></div>
  </div>
</div>

<!-- REGISTER -->
<div id="register" class="screen center">
  <div class="card">
    <h2>Registracija</h2>

    <input id="name" placeholder="Vardas Pavardė">
    <input id="email" placeholder="El. paštas">
    <input id="password" type="password" placeholder="Slaptažodis" oninput="checkPassword()">

    <div id="passwordFeedback" class="status"></div>

    <p class="warn">Nenaudokite kasdienio slaptažodžio</p>

    <p class="policy">
      Kurdamas paskyrą sutinku su
      <span class="link" onclick="openPolicy()">privatumo politika, duomenų valdymu ir naudojimo sąlygomis</span>
    </p>

    <input id="phone" value="+370">

    <select id="role">
      <option value="">Pasirinkite rolę</option>
      <option value="student">Studentas</option>
      <option value="teacher">Mokytojas</option>
    </select>

    <button class="btn primary" onclick="register()">Registruotis</button>
    <div id="registerStatus" class="status"></div>
  </div>
</div>

<!-- VIDEOS -->
<div id="videos" class="screen">

  <div class="topbar">
    <h2>Mathexa</h2>
    <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
  </div>

  <div id="settingsBox" class="settings card">
    <p>Versija: v0.2</p>
    <p>Saugumas: V2.1</p>
    <p>Atnaujinta: 2026</p>
  </div>

  <div class="controls">
    <input id="search" placeholder="Ieškoti..." oninput="searchVideos()">
    <select id="categoryFilter" onchange="filterCategory()">
      <option value="">Visi</option>
      <option value="math">Matematika</option>
      <option value="science">Mokslas</option>
      <option value="history">Istorija</option>
      <option value="physics">Fizika</option>
    </select>
  </div>

  <button class="btn secondary" onclick="activateCode()">Aktyvuoti kodą</button>

  <div id="videoList"></div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
