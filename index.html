<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mathexa 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loadingBanner" class="auth-banner hidden">Tikrinama paskyra...</div>

    <div id="vImpNotif" class="notif-overlay hidden">
        <div class="notif-box">
            <button class="notif-close" onclick="closeNotif('vImpNotif')">✖</button>
            <p id="vImpText"></p>
        </div>
    </div>
    
    <div id="nImpNotif" class="notif-banner hidden">
        <button class="notif-close-small" onclick="closeNotif('nImpNotif')">✖</button>
        <p id="nImpText"></p>
    </div>

    <div id="landing" class="center">
        <h1>Mathexa</h1>
        <div class="btn-group">
            <button id="btnLogin">Prisijungti</button>
            <button id="btnSignup" style="background: var(--glass); border: 1px solid var(--primary);">Registruotis</button>
        </div>
    </div>

    <div id="login" class="center hidden">
        <h2>Prisijungti</h2>
        <div class="input-wrap">
            <input id="email" type="email" placeholder="El. paštas">
            <input id="password" type="password" placeholder="Slaptažodis">
        </div>
        <div id="loginStatus" class="status-msg"></div>
        <button id="loginBtn">Eiti</button>
        <button class="btn-flat" onclick="back()">Atgal</button>
    </div>

    <div id="signup" class="center hidden">
        <h2>Nauja paskyra</h2>
        <div class="input-wrap">
            <input id="name" placeholder="Vardas Pavardė">
            <input id="email2" type="email" placeholder="El. paštas">
            <select id="role">
                <option value="student">Studentas</option>
                <option value="teacher">Mokytojas</option>
            </select>
            <input id="password2" type="password" placeholder="Slaptažodis">
            <input id="password3" type="password" placeholder="Pakartokite slaptažodį">
        </div>
        <div class="legal-box">
            Kurdami paskyrą sutinkate su <a href="policy.txt" target="_blank">taisyklėmis</a>.
        </div>
        <div id="signupStatus" class="status-msg">Minimalus ilgis 8 simb.</div>
        <button id="signupBtn">Sukurti</button>
        <button class="btn-flat" onclick="back()">Atgal</button>
    </div>

    <div id="app" class="hidden">
        <div class="topbar">
            <div class="logo">Mathexa</div>
            <div class="actions">
                <span id="headerClicks">--</span>
                <button id="settingsBtn">⚙</button>
            </div>
        </div>
        <div class="search-area">
            <input id="searchInput" placeholder="Ieškoti pamokos...">
            <select id="langFilter">
                <option value="all">Visi</option>
                <option value="lt">LT</option>
                <option value="en">EN</option>
            </select>
        </div>
        <div id="videos" class="video-grid"></div>
    </div>

    <div id="settings" class="center hidden">
        <h2>Nustatymai</h2>
        <div id="supportIdView">ID: Kraunama...</div>
        
        <div class="clicks-box">
            <div class="clicks-label">LIKUSIOS PERŽIŪROS</div>
            <h1 id="clicksInfo">--</h1>
            <div id="expiryInfo" class="exp-text"></div>
        </div>

        <div class="settings-card">
            <label class="toggle"><input type="checkbox" id="stayLogged"> Likti prisijungus</label>
        </div>

        <div class="settings-card">
            <input id="subCode" placeholder="Prenumeratos kodas">
            <button id="btnRedeem">Aktyvuoti</button>
            <div id="subStatus" class="status-msg"></div>
        </div>
        
        <button id="logoutBtn" class="btn-danger">Atsijungti</button>
        <button id="closeSettings" class="btn-flat">Grįžti</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
