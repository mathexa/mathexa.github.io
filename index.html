<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platforma</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <select id="langSwitch">
    <option value="lt">LT</option>
    <option value="en">EN</option>
  </select>
</div>

<div class="container">

  <div id="landing">
    <h1 id="title"></h1>
    <button id="btnLogin"></button>
    <button id="btnSignup"></button>
  </div>

  <div id="login" class="hidden">
    <h2 id="loginTitle"></h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn"></button>
    <div id="loginStatus"></div>
    <button class="link" id="back1">←</button>
  </div>

  <div id="signup" class="hidden">
    <h2 id="signupTitle"></h2>

    <input id="name" placeholder="Name">

    <div class="phoneRow">
      <select id="prefix">
        <option value="+370">+370</option>
        <option value="+371">+371</option>
      </select>
      <input id="phone" placeholder="Phone">
    </div>

    <input id="email2" placeholder="Email">

    <input id="password2" type="password" placeholder="Password">
    <div id="passwordFeedback"></div>

    <input id="password3" type="password" placeholder="Repeat password">
    <div id="matchFeedback"></div>

    <select id="role">
      <option value="student">student</option>
      <option value="teacher">teacher</option>
    </select>

    <button id="signupBtn"></button>
    <button class="link" id="back2">←</button>
  </div>

  <div id="app" class="hidden">
    <h2>Videos</h2>
    <div id="status"></div>
    <div id="videos"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
