<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathexa v0.1.12</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="center" id="landing">
  <div class="card">
    <h1>Mathexa</h1>
    <button onclick="goAuth()">Pradėti</button>
  </div>
</div>

<div class="center hidden" id="auth">
  <div class="card">
    <input id="name" placeholder="Vardas Pavardė">
    <input id="email" placeholder="El. paštas">
    <input id="password" type="password" placeholder="Slaptažodis">
    <button onclick="register()">Registruotis</button>
    <button onclick="login()">Prisijungti</button>
    <div id="status"></div>
  </div>
</div>

<div id="videos" class="hidden"></div>

<div id="lock" class="lock hidden">
  <div>
    <h2>Limitas pasiektas</h2>
    <button onclick="goAuth()">Grįžti</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
