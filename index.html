<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <title>Mathexa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Mathexa</h1>

<div id="landing">
  <button onclick="showRegister()">Esu naujas (5 nemokami)</button>
  <button onclick="showLogin()">Turiu paskyrą</button>
</div>

<div id="auth" style="display:none;">
  <input id="name" placeholder="Vardas Pavardė"><br>
  <input id="email" placeholder="El. paštas"><br>
  <input id="password" type="password" placeholder="Slaptažodis"><br>
  <input id="code" placeholder="Kodas (nebūtina)"><br>

  <button onclick="register()">Registruotis</button>
  <button onclick="login()">Prisijungti</button>
</div>

<div id="videos"></div>

<div id="playerModal" class="modal">
  <div class="modal-content">
    <span onclick="closePlayer()">X</span>
    <iframe id="player" width="100%" height="400"></iframe>
  </div>
</div>

<div id="lockScreen" class="lock">
  <div>
    <h2>Pasiekėte limitą</h2>
    <p>Įsigykite prenumeratą</p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
