<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathexa</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<div id="landing" class="screen active">
  <h1>Mathexa</h1>
  <button onclick="showScreen('login')">Prisijungti</button>
  <button onclick="showScreen('register')">Registruotis</button>
</div>

<div id="login" class="screen">
  <h2>Prisijungimas</h2>
  <input id="loginEmail" placeholder="El. paštas">
  <input id="loginPassword" type="password" placeholder="Slaptažodis">
  <button onclick="login()">Prisijungti</button>
  <div id="loginStatus"></div>
</div>

<div id="register" class="screen">
  <h2>Registracija</h2>

  <input id="name" placeholder="Vardas Pavardė">
  <input id="email" placeholder="El. paštas">
  <input id="password" type="password" placeholder="Slaptažodis">

  <p class="warn">
  Nenaudokite kasdienio slaptažodžio
  </p>

  <div class="phone-row">
    <input id="phone" value="+370">
    <span class="info" onclick="toggleInfo()">ℹ️</span>
  </div>

  <div id="phoneInfo" class="info-box">
    Jei neturite lietuviško numerio, bus naudojamas el. paštas
  </div>

  <select id="role">
    <option value="">Pasirinkite rolę</option>
    <option value="student">Studentas</option>
    <option value="teacher">Mokytojas</option>
  </select>

  <button onclick="register()">Registruotis</button>
  <div id="registerStatus"></div>
</div>

<div id="videos" class="screen">
  <h2>Vaizdo įrašai</h2>

  <button onclick="toggleSettings()">⚙️</button>

  <div id="settingsBox" class="settings">
    <p>Versija: v0.1</p>
    <p>Saugumas: V2.1</p>
  </div>

  <input id="search" placeholder="Ieškoti..." oninput="searchVideos()">

  <select id="categoryFilter" onchange="filterCategory()">
    <option value="">Visi</option>
    <option value="math">Matematika</option>
    <option value="science">Mokslas</option>
    <option value="history">Istorija</option>
    <option value="physics">Fizika</option>
  </select>

  <button onclick="activateCode()">Aktyvuoti kodą</button>

  <div id="videoList"></div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
