<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <title>Mathexa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="card" id="landing">
  <h1>Mathexa</h1>
  <p>Mokykis išmaniau</p>

  <button onclick="showRegister()">Esu naujas</button>
  <button onclick="showLogin()">Turiu paskyrą</button>
</div>

<div class="card hidden" id="auth">
  <h2>Prisijungimas / Registracija</h2>

  <input id="name" placeholder="Vardas Pavardė">
  <input id="email" placeholder="El. paštas">
  <input id="password" type="password" placeholder="Slaptažodis">
  <input id="code" placeholder="Kodas (nebūtina)">

  <div class="row">
    <button onclick="register()">Registruotis</button>
    <button onclick="login()">Prisijungti</button>
  </div>
</div>

<div id="videos" class="videos"></div>

<div id="playerModal" class="modal hidden">
  <div class="modal-box">
    <iframe id="player"></iframe>
    <button class="close-btn" onclick="closePlayer()">Uždaryti</button>
  </div>
</div>

<div id="lockScreen" class="lock hidden">
  <div class="lock-box">
    <h2>Limitas pasiektas</h2>
    <p>Įsigykite prenumeratą, kad tęstumėte</p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
