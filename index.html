<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mathexa 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="vImpNotif" class="notif-overlay hidden">
        <div class="notif-box">
            <button class="notif-close" onclick="closeNotif('vImpNotif')">✖</button>
            <p id="vImpText"></p>
        </div>
    </div>
    <div id="nImpNotif" class="notif-banner hidden">
        <button class="notif-close-small" onclick="closeNotif('nImpNotif')">✖</button>
        <p id="nImpText"></p>
    </div>

    <div id="landing" class="center">
        <h1>Mathexa</h1>
        <button id="btnLogin">Prisijungti</button>
        <button id="btnSignup">Registruotis</button>
    </div>

    <div id="login" class="center hidden">
        <h2>Prisijungti</h2>
        <input id="email" type="email" placeholder="El. paštas">
        <input id="password" type="password" placeholder="Slaptažodis">
        <div id="loginStatus" class="status-msg"></div>
        <button id="loginBtn">Eiti</button>
        <button onclick="back()">Atgal</button>
    </div>

    <div id="signup" class="center hidden">
        <h2>Nauja paskyra</h2>
        <input id="name" placeholder="Vardas Pavardė">
        <input id="email2" type="email" placeholder="El. paštas">
        
        <select id="role">
            <option value="student">Studentas</option>
            <option value="teacher">Mokytojas</option>
        </select>
        <div class="password-section">
            <input id="password2" type="password" placeholder="Slaptažodis">
            <input id="password3" type="password" placeholder="Pakartokite slaptažodį">
        </div>
        <div class="legal-text">
            Kurdami paskyrą sutinkate su mūsų <a href="policy.txt" target="_blank">duomenų valdymo politika</a>, <a href="policy.txt" target="_blank">privatumo politika</a> ir <a href="policy.txt" target="_blank">naudojimo sąlygomis</a>.
        </div>
        <div id="signupStatus" class="status-msg">Minimalus ilgis 8 simb.</div>
        <button id="signupBtn">Sukurti</button>
        <button onclick="back()">Atgal</button>
    </div>

    <div id="app" class="hidden">
        <div class="topbar">
            <div class="logo">Mathexa</div>
            <div class="actions">
                <span id="headerClicks">--</span>
                <button id="settingsBtn">⚙</button>
            </div>
        </div>
        
        <div style="padding: 15px 25px 0 25px; display: flex; justify-content: center; gap: 10px;">
            <input id="searchInput" placeholder="Ieškoti pamokos arba temos..." 
                   style="width: 100%; max-width: 500px; background: rgba(255,255,255,0.05); 
                          border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px;">
            <select id="langFilter" style="width: 80px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; outline: none;">
                <option value="all" style="color: black;">Visi</option>
                <option value="lt" style="color: black;">LT</option>
                <option value="en" style="color: black;">EN</option>
            </select>
        </div>

        <div id="videos" class="video-grid"></div>
    </div>

    <div id="settings" class="center hidden">
        <h2>Nustatymai</h2>
        <div id="supportIdView">ID: Kraunama...</div>
        <div class="clicks-box">
            <div class="clicks-label">LIKUSIOS PERŽIŪROS</div>
            <h3 id="clicksInfo">--</h3>
        </div>
        <div class="sub-area">
            <input id="subCode" placeholder="Prenumeratos kodas">
            <button id="btnRedeem">Aktyvuoti</button>
            <div id="subStatus" class="status-msg"></div>
        </div>
        
        <button id="bugReportBtn" style="background:#ff9900; margin-top:20px;" onclick="window.open('https://forms.gle/qn1EeUGWqb1KqmVX9', '_blank')">Pranešti apie klaidą</button>
        <button id="logoutBtn" style="background:#ff4d4d; margin-top:10px;">Atsijungti</button>
        <button id="closeSettings">Grįžti</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
